<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Pickup | Rajus Laundromat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">Rajus<span>Laundromat</span></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="pricing.html">Pricing</a>
    <a href="book.html" class="active cta-link">Book Pickup</a>
  </nav>
</header>

<section class="section">
  <h2>Complete Your Booking</h2>
  <p class="section-sub">Confirm your order details</p>

  <div class="card" style="max-width:600px;margin:auto;">

    <p><strong>Service:</strong> <span id="summaryService">—</span></p>
    <p><strong>Quantity:</strong> <span id="summaryQty">—</span></p>
    <p><strong>Express:</strong> <span id="summaryExpress">—</span></p>
    <p><strong>Total:</strong> <span id="summaryTotal">KES 0</span></p>

  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const labels = {
    wash: 'Wash & Fold',
    washIron: 'Wash, Dry & Iron',
    iron: 'Ironing Only',
    dryclean: 'Dry Cleaning',
    duvets: 'Duvets & Curtains'
  };

  const params = new URLSearchParams(window.location.search);

  const service = params.get("service");
  const qty = params.get("qty");
  const express = params.get("express") === "true";
  const total = params.get("total");

  document.getElementById("summaryService").textContent = labels[service] || service || "-";
  document.getElementById("summaryQty").textContent = qty || "-";
  document.getElementById("summaryExpress").textContent = express ? "Yes" : "No";
  document.getElementById("summaryTotal").textContent = "KES " + (total || 0);

});
</script>

</body>
</html>
