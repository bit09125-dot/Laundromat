<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Calculator | Rajus Laundromat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="../scroll-animations.css">
</head>
<body>

<div class="bg-video-wrap">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="images/6482495-uhd_3840_2160_30fps.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
</div>

<header class="navbar">
  <div class="logo">Rajus<span>Laundromat</span></div>
  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="pricing.html" class="active">Pricing</a>
    <a href="book.html" class="cta-link">Book Pickup</a>
    <a href="login.html" class="cta-link">Login</a>
    <a href="signup.html" class="cta-link">Sign Up</a>
  </nav>
</header>

<section class="section" data-animate="fade-up">
  <h2 data-animate="fade-down">Laundry Price Calculator</h2>
  <p class="section-sub" data-animate="fade-up">Instant cost estimate in Kenyan Shillings</p>

  <div class="card" style="max-width:600px;margin:auto;" data-animate="zoom-in">
    <label data-animate="fade-up">Service Type</label>
    <select id="service" data-animate="fade-up">
      <option value="wash">Wash & Fold (KES 100/kg)</option>
      <option value="washIron">Wash, Dry & Iron (KES 150/kg)</option>
      <option value="iron">Ironing Only (KES 50/item)</option>
      <option value="dryclean">Dry Cleaning (KES 400/item)</option>
      <option value="duvets">Duvets & Curtains (From KES 500)</option>
    </select>

    <label style="margin-top:15px;" data-animate="fade-up">Weight / Quantity</label>
    <input type="number" id="quantity" placeholder="Enter kg or items" data-animate="fade-up">

    <label style="margin-top:15px;" data-animate="fade-up">
      <input type="checkbox" id="express"> Express Service (+20%)
    </label>

    <h3 style="margin-top:20px;" data-animate="fade-down">Total: <span id="total" data-animate="pulse">KES 0</span></h3>

    <button style="margin-top:20px;" onclick="proceedBooking()" data-animate="zoom-in">Proceed to Booking</button>
  </div>
</section>
