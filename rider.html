<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Request a Ride | Rajus Laundromat</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="../scroll-animations.css">
</head>
<body>

<div class="bg-video-wrap">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="images/" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
</div>

<header class="navbar">
  <div class="logo">Rajus<span>Laundromat</span></div>
  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="pricing.html">Pricing</a>
    <a href="book.html" class="cta-link">Laundry</a>
    <a href="login.html" class="cta-link">Login</a>
    <a href="rider.html" class="active cta-link">Book Pickup</a>                                
  </nav>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<section class="section" data-animate="fade-up">
  <h1 data-animate="fade-down">🚕 Request a Ride</h1>

  <div class="card" style="max-width: 500px; margin: auto;" data-animate="zoom-in">
    <label data-animate="fade-up">Pickup Location</label><br>
    <input id="pickup" placeholder="Enter pickup location" data-animate="fade-up"><br><br>

    <label data-animate="fade-up">Destination</label><br>
    <input id="destination" placeholder="Enter destination" data-animate="fade-up"><br><br>

    <button onclick="requestRide()" data-animate="zoom-in">Request Ride</button>

    <p id="status" data-animate="fade-up" style="margin-top: 15px;"></p>
  </div>
</section>

<a href="https://wa.me/254717667713" class="whatsapp-float">💬</a>

<script src="../shared-animations.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="js/rider.js"></script>
</body>
</html>
